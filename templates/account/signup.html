<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مک اوربیت | عضویت در پلتفرم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #0b0f19; }
    </style>
</head>
<body class="text-gray-200 min-h-screen flex flex-col justify-between overflow-x-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-950/30 via-gray-950 to-gray-950">

    <header class="max-w-md mx-auto w-full px-6 pt-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full border border-blue-500 flex items-center justify-center relative">
                <div class="w-1.5 h-1.5 bg-cyan-400 rounded-full absolute -top-0.5"></div>
                <span class="text-white text-xs font-bold">M</span>
            </div>
            <span class="text-lg font-black text-white">Mac<span class="text-blue-500">Orbit</span></span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-8">
        <div class="max-w-md w-full bg-gray-900/40 backdrop-blur-xl border border-gray-800/80 p-8 rounded-3xl shadow-2xl shadow-indigo-950/10 relative overflow-hidden">
            
            <div class="absolute -top-12 -right-12 w-36 h-36 bg-indigo-600/10 rounded-full blur-3xl pointer-events-none"></div>

            <div class="text-center mb-6 relative z-10">
                <h1 class="text-xl font-black text-white mb-1.5">ساخت حساب کاربری</h1>
                <p class="text-xs text-gray-400">به جامعه کاربران مک‌اوربیت خوش آمدید</p>
            </div>

            <form method="POST" action="" class="space-y-4 relative z-10">
                {% csrf_token %}

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1.5">نام</label>
                        <input type="text" name="customer_name" required placeholder="مثال: مبین"
                               class="w-full bg-gray-950/80 border border-gray-800 focus:border-blue-500 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-gray-600 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1.5">نام خانوادگی</label>
                        <input type="text" name="customer_familyname" required placeholder="مثال: صادقیان"
                               class="w-full bg-gray-950/80 border border-gray-800 focus:border-blue-500 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-gray-600 focus:outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5">نام کاربری (ID)</label>
                    <input type="text" name="customer_username" required placeholder="username" dir="ltr"
                           class="w-full bg-gray-950/80 border border-gray-800 focus:border-blue-500 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-gray-600 focus:outline-none transition text-left">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5">آدرس ایمیل</label>
                    <input type="email" name="customer_email" required placeholder="example@gmail.com" dir="ltr"
                           class="w-full bg-gray-950/80 border border-gray-800 focus:border-blue-500 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-gray-600 focus:outline-none transition text-left">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5">رمز عبور</label>
                    <input type="password" name="customer_password" required placeholder="••••••••" dir="ltr"
                           class="w-full bg-gray-950/80 border border-gray-800 focus:border-blue-500 rounded-xl px-3.5 py-2.5 text-xs text-white placeholder-gray-600 focus:outline-none transition text-left tracking-widest">
                </div>

                <div class="pt-2">
                    <button type="submit" 
                            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 px-6 rounded-xl transition text-xs shadow-lg shadow-indigo-600/10">
                        تایید و ایجاد حساب کاربری
                    </button>
                </div>

                <div class="text-center pt-2">
                    <p class="text-[11px] text-gray-500">
                        قبلاً ثبت نام کرده‌اید؟ 
                        <a href="#" class="text-blue-400 hover:underline">وارد شوید</a>
                    </p>
                </div>
            </form>
        </div>
    </main>

    <footer class="text-center py-4 text-[10px] text-gray-600 border-t border-gray-950">
        <p>© ۲۰۲۶ مک‌اوربیت. تمامی حقوق محفوظ است.</p>
    </footer>

</body>
</html>
